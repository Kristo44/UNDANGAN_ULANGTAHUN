<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyBirthday</title>
  <style>
    :root{
      --bg1:#ffe4ec;
      --bg2:#fff0f7;
      --card:#fff;
      --accent:#e255a1;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#333;min-height:100vh;overflow-x:hidden;}

    .center{display:flex;align-items:center;justify-content:center}

    .confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:100;}
    .confetti span{position:absolute;width:10px;height:10px;background:var(--accent);opacity:0.7;animation:fall linear infinite;}

    @keyframes fall{
      0%{transform:translateY(-10%) rotate(0deg);opacity:1;}
      100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
    }

    .landing{min-height:100vh;display:grid;place-items:center;position:relative;overflow:hidden;padding:20px;}
    .landing::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,#ffbcd1 0%,transparent 60%),radial-gradient(circle at 80% 70%,#ffd3e3 0%,transparent 60%);z-index:0;animation:bgMove 10s ease-in-out infinite alternate;}
    @keyframes bgMove{0%{transform:scale(1);}100%{transform:scale(1.1);}}

    .invite-card{position:relative;background:var(--card);border-radius:20px;box-shadow:0 10px 30px rgba(255,110,178,0.2);padding:24px;max-width:420px;width:100%;text-align:center;z-index:1;animation:fadeIn 1.5s ease;}
    .photo-frame{width:100%;height:320px;border-radius:16px;overflow:hidden;border:5px solid rgba(255,175,201,0.6);background:#fff;display:flex;align-items:center;justify-content:center;}
    .photo-frame img{width:100%;height:100%;object-fit:cover;animation:zoomIn 3s ease infinite alternate;}

    @keyframes fadeIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    @keyframes zoomIn{0%{transform:scale(1);}100%{transform:scale(1.05);}}

    .look-btn{margin-top:18px;background:linear-gradient(90deg,var(--accent),#ff8fc3);color:#fff;padding:12px 20px;border-radius:12px;border:none;font-weight:600;cursor:pointer;box-shadow:0 6px 18px rgba(226,85,161,0.3);transition:transform .2s;animation:pulse 2s infinite;}
    .look-btn:hover{transform:scale(1.05);}
    @keyframes pulse{0%,100%{box-shadow:0 0 10px #ffaad1;}50%{box-shadow:0 0 20px #ff7bb8;}}

    .invitation{display:none;min-height:100vh;padding:20px;position:relative;overflow:hidden;animation:fadeIn 1s ease forwards;}
    .invitation::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top left,#ffe4ec 0%,transparent 50%),radial-gradient(circle at bottom right,#ffd1e8 0%,transparent 50%);z-index:0;animation:bgMove 10s ease-in-out infinite alternate;}

    .panel{position:relative;z-index:1;max-width:800px;margin:0 auto;background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);border-radius:20px;padding:32px;box-shadow:0 14px 40px rgba(255,120,200,0.2);animation:fadeIn 1s ease;}
    .title{text-align:center;font-size:28px;font-weight:700;margin-bottom:10px;color:#d83388;animation:fadeIn 1.2s ease;}
    .subtitle{text-align:center;color:#555;margin-bottom:22px;animation:fadeIn 1.4s ease;}

    .countdown{display:flex;gap:10px;justify-content:center;margin:20px 0;flex-wrap:wrap;}
    .countdown .item{background:#ffe8f2;border-radius:12px;padding:16px 20px;min-width:84px;text-align:center;box-shadow:inset 0 -4px 8px rgba(226,85,161,0.1)}
    .countdown .num{font-size:22px;font-weight:700;color:#d83388;}

    .map-btn{display:inline-flex;gap:8px;align-items:center;padding:10px 16px;border-radius:10px;border:0;background:linear-gradient(90deg,#fff,#ffe4ec);cursor:pointer;box-shadow:0 6px 12px rgba(0,0,0,0.1);font-weight:600;transition:transform .2s;}
    .map-btn:hover{transform:scale(1.05)}

    .rsvp{margin-top:30px;text-align:center;}
    .rsvp h3{color:#d83388;margin-bottom:10px;}
    .rsvp button{margin-top:10px;background:linear-gradient(90deg,var(--accent),#ff8fc3);color:#fff;padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(226,85,161,0.3);}
    .rsvp button:hover{transform:scale(1.03);}

    @media(max-width:640px){
      .photo-frame{height:240px}
      .panel{padding:20px;}
      .title{font-size:24px;}
    }
  </style>
</head>
<body>
  <div class="confetti" id="confetti"></div>

  <section class="landing center" id="landing">
    <div class="invite-card">
      <div class="photo-frame">
        <img id="coverImg" src="ROSARI.jpeg" alt="Foto Ulang Tahun" />
      </div>
      <button class="look-btn" id="openInvite">Lihat Undangan</button>
    </div>
  </section>

  <section class="invitation" id="invitation">
    <div class="panel">
      <div class="title">Undangan Pesta Ulang Tahun ke-24</div>
      <div class="subtitle">Mari rayakan hari spesial bersama Maria Rosari Prasetraningrum 💖</div>

      <div class="countdown" id="countdown">
        <div class="item"><div class="num" id="days">00</div><div>Hari</div></div>
        <div class="item"><div class="num" id="hours">00</div><div>Jam</div></div>
        <div class="item"><div class="num" id="minutes">00</div><div>Menit</div></div>
        <div class="item"><div class="num" id="seconds">00</div><div>Detik</div></div>
      </div>

      <p style="text-align:center;margin:20px 0;font-size:16px;">📍 Lokasi: <strong>Bekasi</strong></p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a id="mapsLink" href="https://maps.app.goo.gl/6mm7eFwW7o7AoEVf8" target="_blank" rel="noopener noreferrer" class="map-btn">Buka di Google Maps</a>
        <button class="map-btn" id="backBtn">Kembali</button>
      </div>

      <div class="rsvp">
        <h3>Konfirmasi Kehadiran</h3>
        <button id="kirimWA">Kirim Pesan WhatsApp</button>
      </div>
    </div>
  </section>

  <audio id="bgMusic" loop preload="auto">
    <source src="american-authors-best-day-of-my-life-single-version.mp3" type="audio/mpeg">
  </audio>

  <script>
    // === Tanggal acara: 11 Oktober 2026 jam 11:00 ===
    const eventDate = new Date(2026, 9, 11, 11, 0, 0);

    const daysEl=document.getElementById('days'),
          hoursEl=document.getElementById('hours'),
          minutesEl=document.getElementById('minutes'),
          secondsEl=document.getElementById('seconds');

    function updateCountdown(){
      const now=new Date();
      const diff=eventDate-now;
      if(diff<=0)return;
      const s=Math.floor(diff/1000),
            d=Math.floor(s/86400),
            h=Math.floor((s%86400)/3600),
            m=Math.floor((s%3600)/60),
            sec=s%60;
      daysEl.textContent=String(d).padStart(2,'0');
      hoursEl.textContent=String(h).padStart(2,'0');
      minutesEl.textContent=String(m).padStart(2,'0');
      secondsEl.textContent=String(sec).padStart(2,'0');
    }

    let timer;
    const openBtn=document.getElementById('openInvite');
    const landing=document.getElementById('landing');
    const invitation=document.getElementById('invitation');
    const backBtn=document.getElementById('backBtn');
    const audio=document.getElementById('bgMusic');

    function createConfetti(){
      const container=document.getElementById('confetti');
      for(let i=0;i<80;i++){
        const conf=document.createElement('span');
        conf.style.left=Math.random()*100+'%';
        conf.style.backgroundColor = `hsl(${Math.random()*360},70%,70%)`;
        conf.style.animationDuration=(4+Math.random()*3)+'s';
        conf.style.width=conf.style.height=(6+Math.random()*6)+'px';
        container.appendChild(conf);
      }
    }

    function startInvite(){
      landing.style.display='none';
      invitation.style.display='block';
      updateCountdown();
      timer=setInterval(updateCountdown,1000);
      createConfetti();
      audio.play().catch(()=>console.warn('Autoplay diblokir'));
    }

    function closeInvite(){
      clearInterval(timer);
      audio.pause();audio.currentTime=0;
      invitation.style.display='none';
      landing.style.display='grid';
      document.getElementById('confetti').innerHTML='';
    }

    openBtn.addEventListener('click',startInvite);
    backBtn.addEventListener('click',closeInvite);

    // === WhatsApp RSVP ===
    document.getElementById('kirimWA').addEventListener('click',()=>{
      const whatsappNumber = "6281703023620"; // Ganti dengan nomor kamu
      const message = "Hallo Rosa, Aku Hadir Yah";
      const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
      window.open(url,'_blank');
    });
  </script>
</body>
</html>
